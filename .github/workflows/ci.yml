name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Validate server.json versions match package.json
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          SRV_VER=$(node -p "require('./server.json').version")
          SRV_PKG_VER=$(node -p "require('./server.json').packages[0].version")
          echo "package.json: $PKG_VER"
          echo "server.json (top): $SRV_VER"
          echo "server.json (packages[0]): $SRV_PKG_VER"
          if [ "$PKG_VER" != "$SRV_VER" ] || [ "$PKG_VER" != "$SRV_PKG_VER" ]; then
            echo "::error::Version mismatch! package.json=$PKG_VER server.json=$SRV_VER packages[0]=$SRV_PKG_VER"
            exit 1
          fi
          echo "✅ All versions match: $PKG_VER"
