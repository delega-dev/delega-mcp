name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Install + typecheck + build come from the reusable workflow so
    # ci.yml and publish.yml can't drift apart.
    uses: ./.github/workflows/test.yml

  versions:
    # Validate package.json + server.json stay in lockstep. This is
    # specific to the PR gate (the release gate checks a different
    # invariant: version matches the git tag).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Validate server.json versions match package.json
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          SRV_VER=$(node -p "require('./server.json').version")
          SRV_PKG_VER=$(node -p "require('./server.json').packages[0].version")
          echo "package.json: $PKG_VER"
          echo "server.json (top): $SRV_VER"
          echo "server.json (packages[0]): $SRV_PKG_VER"
          if [ "$PKG_VER" != "$SRV_VER" ] || [ "$PKG_VER" != "$SRV_PKG_VER" ]; then
            echo "::error::Version mismatch! package.json=$PKG_VER server.json=$SRV_VER packages[0]=$SRV_PKG_VER"
            exit 1
          fi
          echo "✅ All versions match: $PKG_VER"
