name: Deprecate versions

on:
  workflow_dispatch:
    inputs:
      range:
        description: "Version range to deprecate (e.g. <1.10.0)"
        required: true
      message:
        description: "Deprecation message"
        required: true

permissions:
  contents: read

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pinned (matches publish.yml)
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Deprecate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RANGE: ${{ inputs.range }}
          MESSAGE: ${{ inputs.message }}
        run: npm deprecate "@delega-dev/mcp@${RANGE}" "${MESSAGE}"
