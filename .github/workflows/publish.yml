name: Publish to npm + MCP Registry

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --provenance --access public

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges >> /tmp/changelog.md
          else
            echo "## Initial release" > /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            git log --pretty=format:"- %s (%h)" --no-merges >> /tmp/changelog.md
          fi
          cat /tmp/changelog.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md

  mcp-registry:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to MCP Registry
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
        run: |
          if [ -z "$MCP_REGISTRY_TOKEN" ]; then
            echo "⚠️ MCP_REGISTRY_TOKEN not set — skipping registry publish"
            exit 0
          fi
          # Submit package to MCP Registry via smithery CLI
          npx -y @anthropic/mcp-registry-cli publish \
            --name "@delega-dev/mcp" \
            --version "${GITHUB_REF_NAME#v}" \
            --repository "https://github.com/delega-dev/delega-mcp" \
            --token "$MCP_REGISTRY_TOKEN" || echo "⚠️ MCP Registry publish failed (non-fatal)"
